name: Update and deploy market data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 18 * * 5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REDFIN_CITY_URL: "PASTE_THE_REDFIN_CITY_DOWNLOAD_LINK_HERE"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build market-data.json
        run: python scripts/update_market_data.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
